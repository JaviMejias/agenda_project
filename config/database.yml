default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  database: agenda_project_development

test:
  <<: *default
  database: agenda_project_test

production:
  <<: *default
  database: agenda_project_production
  username: agenda_project
  password: <%= ENV["AGENDA_PROJECT_DATABASE_PASSWORD"] %>