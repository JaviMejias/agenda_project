version: '3.8'

services:
  agenda_db:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - agenda_postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD:-agenda_secure_password}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_DB: ${DB_NAME:-agenda_project_production}
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5

  agenda_web:
    # IMPORTANTE: Reemplaza con la imagen que generes en tu entorno local y subas a un registry
    # Si construyes localmente, puedes usar: image: agenda_project:latest
    image: agenda_project:latest
    restart: unless-stopped
    ports:
      - "3000:80" # El contenedor expone el puerto 80 gracias a Thruster. Lo mapeamos al 3000 externo. Cambia "3000" por el que quieras.
    environment:
      - RAILS_ENV=production
      - RAILS_MASTER_KEY=${RAILS_MASTER_KEY}
      - DATABASE_URL=postgres://${DB_USER:-postgres}:${DB_PASSWORD:-agenda_secure_password}@agenda_db:5432/${DB_NAME:-agenda_project_production}
      - FORCE_SSL=false
      - ACTION_CABLE_DISABLE_FORGERY_PROTECTION=true
      - STORAGE_SERVICE=local # Cambia a 'tigris' o 'amazon' si configuras S3
      - RAILS_SERVE_STATIC_FILES=true
    volumes:
      # Volumen para guardar imágenes de ActiveStorage si usas STORAGE_SERVICE=local
      - agenda_storage:/rails/storage
    depends_on:
      agenda_db:
        condition: service_healthy

  agenda_worker:
    image: agenda_project:latest
    restart: unless-stopped
    command: bin/rails solid_queue:start
    environment:
      - RAILS_ENV=production
      - RAILS_MASTER_KEY=${RAILS_MASTER_KEY}
      - DATABASE_URL=postgres://${DB_USER:-postgres}:${DB_PASSWORD:-agenda_secure_password}@agenda_db:5432/${DB_NAME:-agenda_project_production}
      - FORCE_SSL=false
      - STORAGE_SERVICE=local
    volumes:
      - agenda_storage:/rails/storage
    depends_on:
      agenda_db:
        condition: service_healthy

volumes:
  agenda_postgres_data:
  agenda_storage:
